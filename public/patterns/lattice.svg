<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <defs>
    <pattern id="lattice" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 0,0 L 60,60" stroke="#CD0F2D" stroke-width="1" fill="none" class="lattice-line lattice-line-1" />
      <path d="M 60,0 L 0,60" stroke="#CD0F2D" stroke-width="1" fill="none" class="lattice-line lattice-line-2" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#lattice)" />
</svg>
